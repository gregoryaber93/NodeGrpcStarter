syntax = "proto3";

package metrics;

service MetricsService {
  // Client streaming: Collect multiple metric data points and return aggregated stats
  rpc CollectMetrics(stream MetricData) returns (MetricsSummary);
}

message MetricData {
  string metric_name = 1;
  double value = 2;
  int64 timestamp = 3;
  map<string, string> labels = 4;
}

message MetricsSummary {
  string metric_name = 1;
  int32 total_points = 2;
  double min_value = 3;
  double max_value = 4;
  double avg_value = 5;
  double sum_value = 6;
}
